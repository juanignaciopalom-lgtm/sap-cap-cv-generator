name: Start BTP Apps

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  start-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Download Cloud Foundry CLI
        run: |
          wget -q -O cf8.deb "https://packages.cloudfoundry.org/stable?release=debian64&version=8"
          ls -lh cf8.deb

      - name: Install Cloud Foundry CLI
        run: |
          sudo apt-get update
          sudo dpkg -i cf8.deb || true
          sudo apt-get install -f -y
          cf --version

      - name: Login to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Start backend app
        run: cf start cv-app-srv

      - name: Start approuter app
        run: cf start cv-viewer-approuter

      - name: Check apps
        run: cf apps

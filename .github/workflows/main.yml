name: Start BTP Apps

on:
  schedule:
    - cron: "0 3 * * *"    # 00:00 ARG
    - cron: "0 9 * * *"    # 06:00 ARG
    - cron: "0 15 * * *"   # 12:00 ARG
    - cron: "0 21 * * *"   # 18:00 ARG
  workflow_dispatch:

jobs:
  start-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloud Foundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudfoundry-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudfoundry-keyring.gpg] https://packages.cloudfoundry.org/debian stable main" \
            | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli
          cf --version

      - name: Login to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Start backend app
        run: cf start cv-app-srv || true

      - name: Start approuter app
        run: cf start cv-viewer-approuter || true

      - name: Wait for startup
        run: sleep 30

      - name: Check apps
        run: cf apps

name: Start BTP Apps

on:
  schedule:
    - cron: "50 10 * * *"  # 07:50 ARG
    - cron: "30 13 * * *"  # 10:30 ARG
    - cron: "30 19 * * *"  # 16:30 ARG
    - cron: "30 21 * * *"  # 18:30 ARG
    - cron: "50 23 * * *"  # 20:30 ARG
  workflow_dispatch:

jobs:
  start-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloud Foundry CLI
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/cf-cli.gpg
          echo "deb [signed-by=/usr/share/keyrings/cf-cli.gpg] https://packages.cloudfoundry.org/debian stable main" \
            | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli
          cf --version

      - name: Login to Cloud Foundry
        run: |
          set -e
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Show apps before start
        run: |
          cf apps

      - name: Start apps with retry
        run: |
          set -e

          start_and_verify() {
            APP_NAME="$1"

            echo "======================================"
            echo "Starting app: $APP_NAME"
            echo "======================================"

            cf start "$APP_NAME" || true

            echo "Waiting 20 seconds after first start..."
            sleep 20

            APP_STATE=$(cf app "$APP_NAME" | grep -i "requested state" || true)
            echo "State after first attempt: $APP_STATE"

            echo "$APP_STATE" | grep -qi "started" && {
              echo "App $APP_NAME started successfully on first attempt."
              return 0
            }

            echo "First attempt did not leave app as started. Retrying..."
            cf start "$APP_NAME" || true

            echo "Waiting 20 seconds after retry..."
            sleep 20

            APP_STATE=$(cf app "$APP_NAME" | grep -i "requested state" || true)
            echo "State after retry: $APP_STATE"

            echo "$APP_STATE" | grep -qi "started" && {
              echo "App $APP_NAME started successfully on retry."
              return 0
            }

            echo "ERROR: App $APP_NAME did not reach STARTED state."
            cf app "$APP_NAME" || true
            exit 1
          }

          start_and_verify "cv-app-srv"
          start_and_verify "cv-viewer-approuter"

      - name: Show apps after start
        run: |
          cf apps

_schema-version: "3.1"
ID: cv-app
description: CV Interactivo - CAP Backend + SAPUI5 Frontend
version: 1.0.0

modules:
  # ─── CAP Backend ───────────────────────────────────────────
  - name: cv-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    requires:
      - name: cv-app-postgres
      - name: cv-xsuaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ─── SAPUI5 Frontend ───────────────────────────────────────
  - name: cv-viewer
    type: staticfile
    path: app/cv-viewer/webapp
    parameters:
      memory: 64M
      disk-quota: 256M
    build-parameters:
      builder: custom
      commands: []
      supported-platforms: []
    requires:
      - name: cv-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  # ─── PostgreSQL Deployer (CAP) ─────────────────────────────
  - name: cv-app-postgres-deployer
    type: nodejs
    path: gen/pg
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npm start
    requires:
      - name: cv-app-postgres

resources:
  # ─── XSUAA ─────────────────────────────────────────────────
  - name: cv-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cv-app
        tenant-mode: dedicated

  # ─── PostgreSQL ────────────────────────────────────────────
  - name: cv-app-postgres
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: trial

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

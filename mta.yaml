_schema-version: "3.1"
ID: cv-app
description: CV Interactivo - CAP Backend + SAPUI5 Frontend
version: 1.0.0

modules:
  # ─── CAP Backend ───────────────────────────────────────────
  - name: cv-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    requires:
      - name: cv-hana-db
      - name: cv-xsuaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ─── HDI Deployer ──────────────────────────────────────────
  - name: cv-app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: cv-hana-db

  # ─── SAPUI5 Frontend ───────────────────────────────────────
  - name: cv-viewer
    type: staticfile
    path: app/cv-viewer/webapp
    parameters:
      memory: 64M
      disk-quota: 256M
    build-parameters:
      builder: custom
      commands: []
      supported-platforms: []
    requires:
      - name: cv-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

resources:
  # ─── SAP HANA Cloud HDI Container ──────────────────────────
  - name: cv-hana-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ─── XSUAA ─────────────────────────────────────────────────
  - name: cv-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cv-app
        tenant-mode: dedicated